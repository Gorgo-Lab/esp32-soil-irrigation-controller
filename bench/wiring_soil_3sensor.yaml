    colors: [BK]
    notes: 'Soil1 GND → Q1 C (nodo comune ritorno sensori, vedi avvertenze)'

  W8:
    wirecount: 1
    gauge: 0.25 mm2
    colors: [BK]
    notes: 'Soil2 GND → Q1 C (nodo comune ritorno sensori)'

  W9:
    wirecount: 1
    gauge: 0.25 mm2
    colors: [BK]
    notes: 'Soil3 GND → Q1 C (nodo comune ritorno sensori)'

  W10:
    wirecount: 1
    gauge: 0.25 mm2
    colors: [BK]
    notes: 'Q1 E → ESP32 GND'

  W11:
    wirecount: 1
    gauge: 0.25 mm2
    colors: [OG]
    notes: 'ESP32 GPIO25 → R1 (pin 1) — comando switch alimentazione sensori'

  W12:
    wirecount: 1
    gauge: 0.25 mm2
    colors: [OG]
    notes: 'R1 (pin 2) → Q1 B'

  W13:
    wirecount: 1
    gauge: 0.25 mm2
    colors: [GN]
    notes: 'ESP32 GPIO32 → Soil1 AOUT (segnale analogico)'

  W14:
    wirecount: 1
    gauge: 0.25 mm2
    colors: [GN]
    notes: 'ESP32 GPIO33 → Soil2 AOUT (segnale analogico)'

  W15:
    wirecount: 1
    gauge: 0.25 mm2
    colors: [GN]
    notes: 'ESP32 GPIO34 → Soil3 AOUT (segnale analogico)'

