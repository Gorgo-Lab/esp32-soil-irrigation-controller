# Setup banco: ESP32 + Relè + 1x Capacitive Soil Moisture Sensor v2.0.
# Variante semplificata di bench/soil_3sensor.yaml (che usa 3
# sensori con fusione OR). Pompa/alimentatore/diodo NON collegati.
# Cablaggio: vedi bench/wiring_soil_1sensor.yaml
#
# LOGICA: si legge periodicamente l'umidità del terreno; sotto una soglia
# "secco" si accende il relè (pompa), sopra la soglia "bagnato" si spegne.
# Un cooldown impone una pausa minima tra due accensioni, e un cutoff di
# sicurezza spegne comunque la pompa oltre una durata massima continuativa.
#
# ALIMENTAZIONE A CICLO (duty cycle) DEL SENSORE: il sensore viene acceso solo
# per la finestra di lettura (~2.2s) e spento subito dopo, invece di restare
# sempre alimentato come fanno molti esempi/tutorial. Motivo: preservare nel
# tempo le piste capacitive dalla corrosione/elettrolisi dovute a tensione
# continua in ambiente umido.
#
# MODALITA' DEV/TEST: jumper GPIO4->GND = tempi rapidi per iterare sul banco
# (lettura ogni 5s, cooldown 5s, cutoff 30s). Jumper rimosso = tempi
# normali. Stessa convenzione di controller_pompa.yaml.
#
# CALIBRAZIONE RICHIESTA: soglie placeholder — guarda i log "Soil Moisture
# (V)" con sensore in aria secca e in acqua/terreno saturo, poi aggiorna.

substitutions:
  soil_dry_threshold: "2.5"    # V — sopra = terreno secco (relè ON)
  soil_wet_threshold: "1.8"    # V — sotto = terreno bagnato (relè OFF)

  # assestamento dopo ogni accensione sensore (non dipende da test/normale)
  # necessario perché il circuito capacitivo ha bisogno di qualche istante
  # per stabilizzarsi dopo l'accensione
  sensor_settle_time: 2s

  mode_pin: GPIO4               # collegato a GND = test mode, floating = modalità normale

  read_interval_test: "5000"      # ms — test: lettura ogni 5s
  read_interval_normal: "600000"  # ms — normale: ogni 10 min

  # Cooldown: dopo che il relè si spegne, deve passare almeno cooldown_ms prima che possa riaccendersi
  # anche se il sensore torna a dire "secco".
  # Serve a evitare cicli ravvicinati che stresserebbero pompa e relè reali.
  cooldown_test: "5000"           # ms — test: 5s
  cooldown_normal: "300000"       # ms — normale: 5 min

  # Cutoff di sicurezza: tempo massimo che il relè può restare acceso ininterrottamente (max_on_ms),
  # indipendente da cosa dice il sensore. Scaduto questo tempo si spegne comunque da solo.
  # Serve a proteggere la pompa se il sensore resta bloccato su "secco" (guasto, cavo staccato, lettura anomala).
  max_on_test: "30000"            # ms — test: cutoff sicurezza 30s
  max_on_normal: "300000"         # ms — normale: cutoff sicurezza 5 min

esphome:
  name: pompa-soil-bench-1sensor
  on_boot:
    priority: -100
    then:
      - if:
          condition:
            binary_sensor.is_on: test_mode_sensor
          then:
            - globals.set:
                id: read_interval_ms
                value: "${read_interval_test}"
            - globals.set:
                id: cooldown_ms
                value: "${cooldown_test}"
            - globals.set:
                id: max_on_ms
                value: "${max_on_test}"
            - logger.log: "TEST MODE: lettura 5s, cooldown 5s, cutoff 30s"
          else:
            - logger.log: "NORMAL MODE: lettura 10min, cooldown 5min, cutoff 5min"
      - script.execute: do_read_cycle

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

globals:
  - id: last_pump_off_ms
    type: uint32_t
    initial_value: '0'
  - id: pump_ran_before
    type: bool
    initial_value: 'false'
  - id: read_interval_ms
    type: uint32_t
    initial_value: "${read_interval_normal}"
  - id: cooldown_ms
    type: uint32_t
    initial_value: "${cooldown_normal}"
  - id: max_on_ms
    type: uint32_t
    initial_value: "${max_on_normal}"
  - id: last_read_ms
    type: uint32_t
    initial_value: '0'

binary_sensor:
  - platform: gpio
    pin:
      number: ${mode_pin}
      mode: INPUT_PULLUP
      inverted: true  # LOW (GND) = test mode attivo
    id: test_mode_sensor

  - platform: analog_threshold
    id: soil_dry
    name: "Soil Dry"
    sensor_id: soil_moisture
    threshold:
      upper: ${soil_dry_threshold}
      lower: ${soil_wet_threshold}
    on_press:
      # Terreno secco
      then:
        - if:
            condition:
              lambda: 'return !id(pump_ran_before) || (millis() - id(last_pump_off_ms)) > id(cooldown_ms);'
            then:
              - globals.set:
                  id: pump_ran_before
                  value: 'true'
              - switch.turn_on: relay_pompa
              - script.execute: pump_safety_cutoff
    on_release:
      # Terreno tornato sopra soglia bagnato
      then:
        - script.stop: pump_safety_cutoff
        - switch.turn_off: relay_pompa
        - globals.set:
            id: last_pump_off_ms
            value: !lambda 'return millis();'

switch:
  # Alimentazione diretta del sensore da GPIO (vedi bench/wiring_soil_1sensor.yaml)
  - platform: gpio
    pin: GPIO25
    id: soil_power_switch
    restore_mode: ALWAYS_OFF

  # Relè, trigger low-level (Songle SRD, stessa convenzione di WIRING.md).
  - platform: gpio
    pin:
      number: GPIO27
      inverted: true
    id: relay_pompa
    restore_mode: ALWAYS_OFF

sensor:
  - platform: adc
    pin: GPIO32
    id: soil_moisture
    name: "Soil Moisture (V)"
    update_interval: never
    attenuation: 12db

script:
  - id: pump_safety_cutoff
    then:
      - delay: !lambda 'return id(max_on_ms);'
      - logger.log: "Safety cutoff: max ON time raggiunto, spengo pompa"
      - switch.turn_off: relay_pompa
      - globals.set:
          id: last_pump_off_ms
          value: !lambda 'return millis();'

  - id: do_read_cycle
    then:
      - globals.set:
          id: last_read_ms
          value: !lambda 'return millis();'
      - switch.turn_on: soil_power_switch
      - delay: ${sensor_settle_time}
      - component.update: soil_moisture
      - delay: 200ms
      - switch.turn_off: soil_power_switch

interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return (millis() - id(last_read_ms)) >= id(read_interval_ms);'
          then:
            - script.execute: do_read_cycle
